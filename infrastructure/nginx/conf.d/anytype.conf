# ===========================================
# ANYTYPE - anytype.cloudpublica.org
# ===========================================
# Desktop/mobile sync server only (no web UI)
# Clients connect directly via DRPC (33010) and QUIC (33020/udp)
# These ports are exposed directly in docker-compose, not via nginx
# This config provides a simple HTTPS landing page
# Note: Uses Let's Encrypt cert (grey-cloud/direct DNS for DRPC access)
# ===========================================

server {
    listen 80;
    server_name anytype.cloudpublica.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name anytype.cloudpublica.org;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Config file: user must save to hard drive, then load in app (Settings → Network → Self-hosted → Load)
    location = /anytype-client-config.yml {
        alias /var/www/anytype/anytype-client-config.yml;
        default_type application/x-yaml;
        add_header Content-Disposition 'attachment; filename="anytype-client-config.yml"';
    }

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
