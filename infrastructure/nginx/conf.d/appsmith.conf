# ===========================================
# APPSMITH - hq.cloudpublica.org
# ===========================================
# Community portal / admin dashboard
# Rate limiting enabled for brute force protection
#
# FIX (Jan 2026): Use Host localhost to avoid Appsmith's internal
# Caddy redirect loop. X-Forwarded-Host preserves original host.
# ===========================================

server {
    listen 80;
    server_name hq.cloudpublica.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name hq.cloudpublica.org;

    ssl_certificate /etc/nginx/certs/cloudpublica-origin.crt;
    ssl_certificate_key /etc/nginx/certs/cloudpublica-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Authenticated Origin Pulls — only accept connections from Cloudflare
    include /etc/nginx/conf.d/authenticated-origin-pull.conf.inc;

    client_max_body_size 100M;

    # Rate limiting for login endpoint (5 attempts per minute)
    location /api/v1/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://appsmith:80;
        proxy_set_header Host localhost;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # General rate limiting (10 req/sec with burst of 20)
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://appsmith:80;
        # Use localhost to avoid Appsmith Caddy redirect loop
        proxy_set_header Host localhost;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
