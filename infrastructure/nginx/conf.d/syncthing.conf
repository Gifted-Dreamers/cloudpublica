# ===========================================
# SYNCTHING - sync.cloudpublica.org
# ===========================================
# Web GUI for Syncthing file synchronization
# DNS-only (grey-cloud) in Cloudflare — uses LE cert
# Sync protocol ports (22000, 21027) go direct, NOT through nginx
# ===========================================

server {
    listen 80;
    server_name sync.cloudpublica.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sync.cloudpublica.org;

    # Grey-cloud — uses Let's Encrypt cert (not CF origin)
    ssl_certificate /etc/letsencrypt/live/base.cloudpublica.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/base.cloudpublica.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://syncthing:8384;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
