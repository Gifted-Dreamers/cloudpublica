# Default server for cloudpublica.org and www.cloudpublica.org
server {
    listen 80;
    server_name cloudpublica.org www.cloudpublica.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cloudpublica.org www.cloudpublica.org;

    ssl_certificate /etc/nginx/certs/cloudpublica-origin.crt;
    ssl_certificate_key /etc/nginx/certs/cloudpublica-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Authenticated Origin Pulls — only accept connections from Cloudflare
    include /etc/nginx/conf.d/authenticated-origin-pull.conf.inc;

    # Static (mount: nginx/static -> /var/www/anytype)
    location = /favicon.ico {
        alias /var/www/anytype/favicon.png;
        default_type image/png;
        add_header Cache-Control "public, max-age=86400";
    }

    # Landing at root: same design as commoncloud.cc (teal/cyan, dark gradient)
    # Use try_files so the request is served here; index + root would internally redirect to /index.html
    # and then match "location /" below, which returns 404.
    location = / {
        root /var/www/anytype;
        try_files /index.html =404;
    }

    location / {
        return 404;
    }
}
