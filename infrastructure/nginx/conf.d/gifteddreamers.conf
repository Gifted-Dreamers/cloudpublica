# gifteddreamers.org - Static React Site with SSL

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name gifteddreamers.org www.gifteddreamers.org;

    # ACME challenge for SSL cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name gifteddreamers.org www.gifteddreamers.org;

    ssl_certificate /etc/nginx/certs/gifteddreamers.org/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/gifteddreamers.org/privkey.pem;

    # Authenticated Origin Pulls — only accept connections from Cloudflare
    include /etc/nginx/conf.d/authenticated-origin-pull.conf.inc;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/gifteddreamers.org;
    index index.html;

    # Force correct MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # React SPA - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Short cache for HTML (allows quick updates)
        add_header Cache-Control "public, max-age=3600";
    }

    # Cache static assets with hashed filenames (immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache images with longer lifetime
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Cache fonts
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache CSS and JS
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Security headers (must be in location blocks or they get overwritten)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
