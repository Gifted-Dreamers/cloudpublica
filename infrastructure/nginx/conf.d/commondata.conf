# ===========================================
# PLANET EARTH SOCIETY - commondata.cc
# ===========================================
# React + Express app (planet-earth-society)
# Container runs Node on port 3000
# ===========================================

server {
    listen 80;
    server_name commondata.cc www.commondata.cc;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name commondata.cc www.commondata.cc;

    ssl_certificate /etc/nginx/certs/commondata-origin.crt;
    ssl_certificate_key /etc/nginx/certs/commondata-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://planet-earth-society:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
