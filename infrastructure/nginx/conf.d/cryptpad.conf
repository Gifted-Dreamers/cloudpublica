# ===========================================
# CRYPTPAD - pad.cloudpublica.org
# ===========================================
# End-to-end encrypted collaborative editing
# Two subdomains required:
#   - pad.cloudpublica.org (main app)
#   - sandbox.pad.cloudpublica.org (XSS isolation)
# WebSocket required for real-time collaboration
# ===========================================

server {
    listen 80;
    server_name pad.cloudpublica.org sandbox.pad.cloudpublica.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pad.cloudpublica.org sandbox.pad.cloudpublica.org;

    ssl_certificate /etc/nginx/certs/cloudpublica-origin.crt;
    ssl_certificate_key /etc/nginx/certs/cloudpublica-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Authenticated Origin Pulls — only accept connections from Cloudflare
    include /etc/nginx/conf.d/authenticated-origin-pull.conf.inc;

    # WebSocket for real-time collaboration
    location /cryptpad_websocket {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://cryptpad:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 36000s;
    }

    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://cryptpad:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
