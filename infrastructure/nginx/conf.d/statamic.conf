# ===========================================
# STATAMIC - base.cloudpublica.org
# ===========================================
# Knowledge base / documentation CMS
# Rate limiting enabled for brute force protection
# ===========================================

server {
    listen 80;
    server_name base.cloudpublica.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name base.cloudpublica.org;

    ssl_certificate /etc/nginx/certs/cloudpublica-origin.crt;
    ssl_certificate_key /etc/nginx/certs/cloudpublica-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Authenticated Origin Pulls — only accept connections from Cloudflare
    include /etc/nginx/conf.d/authenticated-origin-pull.conf.inc;

    client_max_body_size 50M;

    # Rate limiting for login endpoint (5 attempts per minute)
    location /cp/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://statamic:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # General rate limiting (10 req/sec with burst of 20)
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://statamic:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
