# ===========================================
# MATRIX SYNAPSE - matrix.cloudpublica.org
# ===========================================
# Federated chat homeserver (Matrix protocol)
# Handles both client-server and federation APIs
# ===========================================

server {
    listen 80;
    server_name matrix.cloudpublica.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name matrix.cloudpublica.org;

    ssl_certificate /etc/nginx/certs/cloudpublica-origin.crt;
    ssl_certificate_key /etc/nginx/certs/cloudpublica-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Authenticated Origin Pulls — only accept connections from Cloudflare
    include /etc/nginx/conf.d/authenticated-origin-pull.conf.inc;

    # Matrix media uploads
    client_max_body_size 50M;

    # .well-known delegation (allows @user:matrix.cloudpublica.org identifiers)
    location /.well-known/matrix/server {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.server": "matrix.cloudpublica.org:443"}';
    }

    location /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver": {"base_url": "https://matrix.cloudpublica.org"}}';
    }

    # Synapse admin and client APIs
    location ~ ^(/_matrix|/_synapse/client) {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Chunked responses and WebSocket support for sync
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Block admin API from external access (admin API only via localhost/tunnel)
    location /_synapse/admin {
        return 403;
    }

    # Default — return 404 for anything not Matrix
    location / {
        return 404;
    }
}
