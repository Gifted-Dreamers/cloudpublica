# ===========================================
# JITSI MEET - meet.cloudpublica.org
# ===========================================
# Video conferencing platform
# WebSocket support required for XMPP and Colibri channels
# Note: UDP 10000 for JVB media goes direct, NOT through nginx
# ===========================================

server {
    listen 80;
    server_name meet.cloudpublica.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name meet.cloudpublica.org;

    ssl_certificate /etc/nginx/certs/cloudpublica-origin.crt;
    ssl_certificate_key /etc/nginx/certs/cloudpublica-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Authenticated Origin Pulls — only accept connections from Cloudflare
    include /etc/nginx/conf.d/authenticated-origin-pull.conf.inc;

    # XMPP WebSocket (signaling) — must have WebSocket upgrade
    location /xmpp-websocket {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://jitsi-web:80/xmpp-websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
    }

    # Colibri WebSocket (bridge data channel) — must have WebSocket upgrade
    location /colibri-ws/ {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://jitsi-web:80/colibri-ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
    }

    # Default — Jitsi web UI
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://jitsi-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
