# ===========================================
# LINKSTACK - linkstack.cloudpublica.org
# ===========================================
# Self-hosted link-in-bio page
# Container runs Apache with internal self-signed SSL
# Proxy to HTTPS port 443 inside container
# ===========================================

server {
    listen 80;
    server_name linkstack.cloudpublica.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name linkstack.cloudpublica.org;

    ssl_certificate /etc/nginx/certs/cloudpublica-origin.crt;
    ssl_certificate_key /etc/nginx/certs/cloudpublica-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Authenticated Origin Pulls — only accept connections from Cloudflare
    include /etc/nginx/conf.d/authenticated-origin-pull.conf.inc;

    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass https://linkstack:443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Accept container's self-signed cert
        proxy_ssl_verify off;
    }
}
