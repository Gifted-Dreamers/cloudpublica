<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Cloud Publica — Community portal and tools for the grid. Coming soon.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cloudpublica.org/">
  <meta property="og:title" content="Cloud Publica — Coming soon">
  <meta property="og:description" content="Cloud Publica — Community portal and tools for the grid. Coming soon.">
  <title>Cloud Publica — Coming soon</title>
  <link rel="canonical" href="https://cloudpublica.org/">
  <link rel="icon" href="/favicon.ico?v=1" type="image/png">
  <style>
    :root {
      --cc-teal: #206795;
      --cc-cyan: #38c1e0;
      --cc-dark: #1a3347;
      --cc-muted: #5a7a8f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(165deg, #0f2027 0%, #1a3347 45%, #0d1a24 100%);
      color: #e8eef2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 1.5rem;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 600;
      color: #fff;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 1.125rem;
      color: var(--cc-cyan);
      margin: 0 0 2rem;
      font-weight: 500;
    }
    .message {
      font-size: 1.25rem;
      color: var(--cc-muted);
      max-width: 28em;
      margin: 0 0 2rem;
      line-height: 1.5;
    }
    .cta {
      display: inline-block;
      padding: 0.6rem 1.25rem;
      background: transparent;
      color: var(--cc-cyan);
      border: 2px solid var(--cc-cyan);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, color 0.2s;
    }
    .cta:hover {
      background: var(--cc-cyan);
      color: var(--cc-dark);
    }
    .footer {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: var(--cc-muted);
    }
    .footer a {
      color: var(--cc-cyan);
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="/favicon.ico" alt="Cloud Publica" width="120" height="120">
  </div>
  <h1>Cloud Publica</h1>
  <p class="tagline">Coming soon</p>
  <p class="message">Community portal and tools for the grid. We’re building something better—check back soon.</p>
  <a href="https://hq.cloudpublica.org" class="cta">Go to portal</a>
  <p class="footer">&copy; 2026 <a href="https://gifteddreamers.org">Gifted Dreamers, Inc</a> — 501(c)(3)</p>
</body>
</html>
