# ===========================================
# NGINX MAIN CONFIGURATION
# ===========================================
# Security-hardened configuration for Common Cloud
# Rate limiting, SSL hardening, and security headers included
#
# DEPLOYMENT: Copy to ~/commoncloud/nginx/nginx.conf on server
# ===========================================

events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ===========================================
    # RATE LIMITING - Brute Force Protection
    # ===========================================
    # Zone: 10MB shared memory (~160,000 IP addresses)
    # Rate: 10 requests/second per IP (burst allows short spikes)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Return 429 Too Many Requests (not 503)
    limit_req_status 429;

    # Log rate limit violations
    limit_req_log_level warn;

    # ===========================================
    # SECURITY HEADERS
    # ===========================================
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Enable XSS filter
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===========================================
    # SSL HARDENING
    # ===========================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS - SSL strip protection (enabled Feb 2026 security audit)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Content Security Policy - restrictive default; per-service overrides in conf.d
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';" always;

    # Disable unnecessary browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # Include site configs (conf.d/cloudflare-real-ip.conf restores client IP when CF proxy is ON)
    include /etc/nginx/conf.d/*.conf;
}
